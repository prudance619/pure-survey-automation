# Pure Survey Platform - test configuration
# Update these values for your environment. Do not commit real passwords to public repositories.

base.url=YOUR_URL
browser=chrome

username=YOUR_USERNAME
password=YOUR_PASSWORD

# How long Selenium waits for elements (seconds)
timeout.seconds=25

# Prefix for surveys created by future automation tests (not used in initial smoke tests)
test.survey.name.prefix=AUTO_TEST_
